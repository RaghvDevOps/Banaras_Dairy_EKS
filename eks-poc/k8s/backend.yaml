apiVersion: apps/v1
kind: Deployment
metadata:
  name: banaras-backend
  labels:
    app: banaras-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banaras-backend
  template:
    metadata:
      labels:
        app: banaras-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/raghvdevops/banaras_dairy-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: db-credentials
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "350Mi"
---
# Named "api" (not "banaras-backend-svc") ON PURPOSE: the frontend nginx image
# has a hardcoded upstream `server api:8000;` (from the docker-compose setup,
# where the compose service was named "api"). Kubernetes DNS resolves plain
# service names within the same namespace, so keeping this name "api" means
# the existing frontend image works with ZERO changes/rebuilds.
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: banaras-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
