apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  01-create-recovery-db.sh: |
    #!/bin/sh
    # Runs once on Postgres' first boot (when the data volume is empty). Creates
    # the secondary database used by the recovery service. Idempotent: skips if
    # it already exists.
    set -e
    RECOVERY_DB="${RECOVERY_DB:-banaras_dairy_recovery}"
    echo "[init-db] Ensuring recovery database '${RECOVERY_DB}' exists..."
    psql -v ON_ERROR_STOP=1 --username "${POSTGRES_USER}" --dbname "${POSTGRES_DB}" <<-EOSQL
        SELECT 'CREATE DATABASE ${RECOVERY_DB}'
        WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '${RECOVERY_DB}')
        \gexec
    EOSQL
    echo "[init-db] Done."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  # POC only: 1 replica, emptyDir storage. Data is LOST if this pod restarts
  # or reschedules. For real production, use a StatefulSet + EBS-backed PVC.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: db-credentials
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "350Mi"
      volumes:
        - name: pgdata
          emptyDir: {}
        - name: init-script
          configMap:
            name: postgres-init-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
