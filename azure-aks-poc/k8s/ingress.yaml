apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: banaras-ingress
  annotations:
    # This one annotation is what makes AGIC (not any generic nginx
    # controller) pick up this Ingress and reprogram the real Application
    # Gateway -- functionally the same role as `alb` in eks-poc's ingress.yaml.
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: banaras-frontend-svc
                port:
                  number: 80
